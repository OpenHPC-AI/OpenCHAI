---
###############################################################################
# Master HPC Provisioning – Enterprise Orchestrator
###############################################################################

- name: Master HPC Provisioning Playbook
  hosts: hpc_master
  gather_facts: no
  ignore_unreachable: yes
  become: true

  vars_files:
    - ../../../automation/ansible/group_vars/all.yml

  tasks:
    - name: Display starting banner
      ansible.builtin.debug:
        msg: "Starting HPC provisioning on {{ inventory_hostname }}"
      tags: [always]

###############################################################################
# PHASE 3 – Network
###############################################################################
# ---------------------------------------------------------------------------
# RDMA, Mellanox Ofed Installation and Configuration
# ---------------------------------------------------------------------------

- import_playbook: ../../../automation/ansible/playbook_library/network/setup_mellanox.yml
  vars:
    install_mellanox: true   # set to false to skip re-installation
    mlnx_dir_path: "{{ bin_dir_path }}/mellanox_rpms"
    dev_rpm_path: "{{ rpm_stack_path }}/developement_rpms"
