---
###############################################################################
# Master HPC Provisioning – Enterprise Orchestrator
###############################################################################

- name: Master HPC Provisioning Playbook
  hosts: hpc_master
  gather_facts: no
  ignore_unreachable: yes
  become: true

  vars_files:
    - ../../../automation/ansible/group_vars/all.yml

  tasks:
    - name: Display starting banner
      ansible.builtin.debug:
        msg: "Starting HPC provisioning on {{ inventory_hostname }}"
      tags: [always]

###############################################################################
# PHASE 1 – PRE-REQUISITES
###############################################################################

- import_playbook: ../../../automation/ansible/playbook_library/network/internet_client.yml
  vars:
    primary_nameserver: "{{ headnode_ip }}"
    fallback_dns:
      search_domains:
        - dns.server.in
        - server.in
      nameservers:
        - 192.168.192.11
