---
###############################################################################
# Master HPC Provisioning – Enterprise Orchestrator
###############################################################################

- name: Master HPC Provisioning Playbook
  hosts: hpc_master
  gather_facts: no
  ignore_unreachable: yes
  become: true

  vars_files:
    - ../../../automation/ansible/group_vars/all.yml

  tasks:
    - name: Display starting banner
      ansible.builtin.debug:
        msg: "Starting HPC provisioning on {{ inventory_hostname }}"
      tags: [always]

# =======================================================================================================
# =====================  PHASE 5: Authentication: OpenLDAP Container Installation   =====================
# =======================================================================================================

- import_playbook: ../../../automation/ansible/playbook_library/install/ldap/install_multi_rep_openldap_server.yml
  vars:
    ldap_pv_dir: "/hpc_container_pv/ldapdata"
    openldap_image: "{{ openldap_container_image }}"
    ldap_container_img: "{{ ldap_container_img_tar }}"
    ldap_version: "{{ ldap_version_tag }}"
    ldap_reg_network_url: "{{ hpcsangrah_vault_network_url }}/OpenCHAI/hpcsuite_registry/container_img_reg/{{ os_version }}/ldap_reg/{{ ldap_version }}/{{ ldap_container_img }}"
    ssl_certificate_check: no
    primary_ldap_server_ip: "{{ primary_ldap_node_ip }}"
    secondary_ldap_server_ip: "{{ secondary_ldap_node_ip }}"
    retries_attampt: 5
    delay_time: 10

- import_playbook: ../../../automation/ansible/playbook_library/configure/ldap_docker_hostmachine_setup.yml
  vars:
    ldap_version: "{{ ldap_version_tag }}"
